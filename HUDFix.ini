[Fix HUD]
; Constrain the HUD/UI to a centred 16:9 region while the world stays ultrawide.
Enabled=true
; Log the in-viewport widget tree to HUDFix.log (useful for tuning).
Diagnostic=true
; How often (ms) the diagnostic sweep runs.
SweepIntervalMs=2000

[Debug]
; Isolation toggles. Start with both OFF: the plugin only logs and idles (probe).
; If the game is stable, enable these one at a time to find what destabilises it.
InstallResHook=false
EnableSweep=false
SweepStartDelayMs=20000
