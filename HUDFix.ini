[Fix HUD]
; Constrain the HUD/UI to a centred 16:9 region while the world stays ultrawide (via SUWSF).
Enabled=true
; Verbose widget logging to HUDFix.log. Leave off for normal play; turn on only for troubleshooting.
Diagnostic=false
SweepIntervalMs=2000

; --- Interact prompt (the floating button icon next to NPCs/items) ---
; The prompt is world-tracked; the 16:9 constraint shifts it sideways, so it is nudged back.
; MarkerShiftPx: pixels to shift it. -1 = auto (= full pillarbox offset, which overshoots).
; NOTE: this is a pixel value tuned for 5120x2160. On other resolutions/aspect ratios you may
; need to adjust it (see the README "Per-resolution tuning" note).
MarkerShiftPx=275

; --- Screen-edge border decoration ---
; BorderWidget : widget-name substring to act on (blank = off).
; BorderMode   : hide   = make it invisible
;                shiftL = render-translate it toward the screen edge by BorderShiftPx
;                scale  = counter-scale it to full screen
; BorderShiftPx: pixels for shiftL mode; -1 = auto (= full pillarbox offset). Tuned for 5120x2160.
; Default hides the dragged-in bottom-left corner decoration. Switch to shiftL to reposition instead.
BorderWidget=Decoration_L
BorderMode=hide
BorderShiftPx=325

; --- Shrink a HUD widget (render-scale) ---
; ShrinkWidget : widget-name substring (blank = off).
; ShrinkScale  : <1 shrinks, 1 = no change.
; ShrinkPivotX/Y : point the scale pulls toward (0.5,0.5 = centre).
; ShrinkOffsetX/Y: pixel nudge after scaling (-X = left, -Y = up). Tuned for 5120x2160.
; Default shrinks the support-fairy portrait to 70% and re-seats it in the bottom-left corner.
ShrinkWidget=WBP_SupportCharacter
ShrinkScale=0.7
ShrinkPivotX=0.5
ShrinkPivotY=0.5
ShrinkOffsetX=-60
ShrinkOffsetY=-30

[Debug]
InstallResHook=false
EnableSweep=false
SweepStartDelayMs=20000
