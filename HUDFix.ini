[Fix HUD]
; Constrain the HUD/UI to a centred 16:9 region while the world stays ultrawide (via SUWSF).
Enabled=true
; Verbose widget logging to HUDFix.log. Leave off for normal play; turn on only for troubleshooting.
Diagnostic=false
; Pixel shift used by every 'marker' rule (world-tracked prompts). -1 = auto (= pillarbox offset).
; Tuned for 5120x2160; other resolutions may need adjustment (see README).
MarkerShiftPx=275

; ============================ Dynamic element rules ============================
; Each [Rule.<name>] targets HUD widgets by name and applies ONE operation. Add/remove/edit freely;
; no rebuild needed. Fields:
;   Match    = one or more widget-name fragments, comma-separated (ANY match). Required.
;   Exact    = true to require the whole name to equal a fragment (default false = substring).
;   Op       = move | hide | fullscreen | marker          (default move)
;              move       : render-scale + reposition (Scale/Offset). Canvas widgets move via the
;                           layout slot (stable + survives re-layout); overlays via render-transform.
;              hide       : make the widget invisible.
;              fullscreen : expand a child back out to the full screen past the 16:9 band.
;              marker     : realign a world-tracked prompt (uses MarkerShiftPx).
;   Scale    = render scale for 'move' (1 = none).
;   PivotX/Y = scale pivot, 0..1 (default 0.5,0.5 = centre).
;   OffsetX/Y= pixel reposition for 'move' (-X = left, -Y = up). Tuned for 5120x2160.

; Damage vignette must keep covering the whole screen. (Narrow match — the engine walks the whole tree,
; so broad fragments like "Damage"/"Vignette" would wrongly hit text/progress-bar widgets.)
[Rule.Vignette]
Match=WBP_HUD_dying
Op=fullscreen

; World-tracked prompts (the floating interact icon, etc.). Add more names to Match as you find them
; e.g. the "magic unavailable" prompt: Match=InteractiveGuideWidget,<that widget's name>
[Rule.WorldPrompts]
Match=InteractiveGuideWidget
Op=marker

; Magic-unavailable / item world-mark (WBP_ItemNAMark) — also world-tracked, but positions via render
; transform, so it gets its own rule/shift. OffsetX/Y override MarkerShiftPx for this marker; set them
; if it needs a different correction than the interact prompt (leave 0 to use MarkerShiftPx).
[Rule.MagicMark]
Match=WBP_ItemNAMark
Op=marker
OffsetX=0
OffsetY=0

; World-tracked NPC bubbles/emoticons (symbols above heads in cutscenes). These must track NPCs across
; the full ultrawide width, so exclude them from the 16:9 crop entirely (keep them full-screen).
[Rule.WorldBubbles]
Match=WBP_EmoticonHUD,WBP_SpeechBubbleHUD
Op=nocrop

; The dragged-in bottom-left corner decoration: hide it (set Op=move + Offset to reposition instead).
[Rule.CornerBorder]
Match=Decoration_L
Exact=true
Op=hide

; Support-fairy portrait: shrink to 70% and re-seat in the bottom-left corner.
[Rule.FairyPortrait]
Match=WBP_SupportCharacter
Exact=true
Op=move
Scale=0.7
OffsetX=-60
OffsetY=-100

; Support-fairy dialogue bubble: shrink to match the portrait; tune Offset to pull it toward the fairy.
[Rule.FairyDialogue]
Match=WBP_SupportCharacterMsg
Op=move
Scale=0.7
OffsetX=-60
OffsetY=-100

; Support-fairy command panel: shrink + move with the fairy; tune Offset to seat it by the portrait.
[Rule.FairyCommand]
Match=Canvas_SupportGuide
Op=move
Scale=0.7
OffsetX=-60
OffsetY=-100

[Debug]
InstallResHook=false
EnableSweep=false
SweepStartDelayMs=20000
